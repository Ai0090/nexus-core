openapi: 3.0.3
info:
  title: TET Network B2B Inference Gateway (Prototype)
  version: "0.1.0"
  description: |
    TET Network exposes an OpenAI-compatible inference API plus network/ledger telemetry.
    This file is generated by reverse-engineering the current REST structure.
servers:
  - url: http://localhost:5010
    description: Local tet-core REST (example)
tags:
  - name: OpenAICompat
  - name: Ledger
  - name: Energy
  - name: Network
  - name: Compute
paths:
  /v1/chat/completions:
    post:
      tags: [OpenAICompat]
      summary: OpenAI-compatible chat completions (prototype)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatCompletionsRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatCompletionsResponse"
  /status:
    get:
      tags: [Network]
      summary: Node status
      responses:
        "200":
          description: OK
  /compute/stats:
    get:
      tags: [Compute]
      summary: Local compute stats
      responses:
        "200":
          description: OK
  /economics/snapshot:
    get:
      tags: [Energy]
      summary: Economics + energy snapshot (includes ESR)
      responses:
        "200":
          description: OK
  /ledger/me:
    get:
      tags: [Ledger]
      summary: Wallet balance (stateless)
      description: |
        Stateless identity: requires `wallet_id` query parameter.
      parameters:
        - in: query
          name: wallet_id
          required: true
          schema:
            type: string
            description: 64-hex Ed25519 wallet id
      responses:
        "200":
          description: OK
  /ledger/all:
    get:
      tags: [Ledger]
      summary: Export balances (debug)
      responses:
        "200":
          description: OK
  /ledger/transfer:
    post:
      tags: [Ledger]
      summary: Transfer TET (Protocol Fee 0.5–1.0% routed to Ops)
      description: Requires x-api-key.
      parameters:
        - in: header
          name: x-api-key
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TransferRequest"
      responses:
        "200": { description: OK }
        "400": { description: Bad Request }
        "401": { description: Unauthorized }
  /ledger/proof:
    get:
      tags: [Energy]
      summary: List Proof-of-Energy records (read-only)
      description: Requires x-api-key.
      parameters:
        - in: header
          name: x-api-key
          required: true
          schema: { type: string }
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 1000, default: 50 }
        - in: query
          name: before_id
          schema: { type: integer, minimum: 1 }
      responses:
        "200": { description: OK }
        "401": { description: Unauthorized }
  /ledger/proof/{id}:
    get:
      tags: [Energy]
      summary: Fetch one Proof-of-Energy record by id (includes verified flag)
      description: Requires x-api-key.
      parameters:
        - in: header
          name: x-api-key
          required: true
          schema: { type: string }
        - in: path
          name: id
          required: true
          schema: { type: integer, minimum: 1 }
      responses:
        "200": { description: OK }
        "401": { description: Unauthorized }
        "404": { description: Not Found }
components:
  schemas:
    ChatCompletionsRequest:
      type: object
      properties:
        model: { type: string, nullable: true }
        messages:
          type: array
          items:
            type: object
            properties:
              role: { type: string }
              content: { type: string }
            required: [role, content]
        max_tokens: { type: integer, nullable: true }
        high_priority: { type: boolean, nullable: true }
      required: [messages]
    ChatCompletionsResponse:
      type: object
      description: OpenAI-like response envelope (prototype)
    TransferRequest:
      type: object
      properties:
        to_peer_id: { type: string }
        amount_nxs: { type: number }
        fee_bps: { type: integer, nullable: true, description: "Optional override; clamped to 50..=100 in ledger" }
      required: [to_peer_id, amount_nxs]

